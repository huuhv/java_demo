spring.application.name=demo

# Configuration for MySQL database connection
spring.datasource.url=jdbc:mysql://localhost:3306/demo_java
spring.datasource.username=root
spring.datasource.password=Aa@123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate configuration
# Auto create/update tables based on entity classes
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console (for debugging)
spring.jpa.show-sql=true

# Format SQL output for readability
spring.jpa.properties.hibernate.format_sql=true

# MySQL dialect for Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server configuration
server.port=8080
